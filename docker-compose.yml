services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: txn
      POSTGRES_PASSWORD: txn
      POSTGRES_DB: txn
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U txn -d txn"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://txn:txn@db:5432/txn?sslmode=disable
      HTTP_ADDR: ":8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
