databases:
  - name: golang-transaction-db
    plan: free
    databaseName: txn
    user: txn

services:
  - type: web
    name: golang-transaction-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: golang-transaction-db
          property: connectionString
